name: Test and Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check code formatting and linting
      run: npm run biome:check

    - name: Check TypeScript types
      run: npm run types:check

    - name: Run tests
      run: npm run test -- --exclude tests/setup/base.test.ts
      env:
        APP_BASE_URL: dummy_url_for_testing
        APP_SECRET: dummy_secret_for_testing
        SMTP_HOST: dummy_host_for_testing
        SMTP_PORT: dummy_port_for_testing
